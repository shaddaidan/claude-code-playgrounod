<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>X Reply Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #ef4444;
      --amber:    #f59e0b;
      --green:    #22c55e;
      --blue:     #3b82f6;
      --purple:   #a855f7;
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px calc(56px + env(safe-area-inset-bottom));
      gap: 16px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 8px; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    /* ── Section divider ── */
    .section-label {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Textarea card ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.25s;
    }
    .card.tier-red   { border-color: var(--red); }
    .card.tier-amber { border-color: var(--amber); }
    .card.tier-green { border-color: var(--green); }
    .card.over-limit { border-color: var(--red) !important; }

    textarea {
      width: 100%;
      min-height: 140px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-size: 1.0625rem;
      line-height: 1.6;
      font-family: inherit;
      caret-color: var(--text);
    }
    textarea::placeholder { color: var(--muted); }

    /* ── Counter row ── */
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .count-badge {
      font-size: 2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      line-height: 1;
      transition: color 0.25s;
    }
    .count-badge.tier-red   { color: var(--red); }
    .count-badge.tier-amber { color: var(--amber); }
    .count-badge.tier-green { color: var(--green); }
    .count-badge.over-limit { color: var(--red) !important; }
    .count-label { font-size: 0.75rem; color: var(--muted); text-align: right; }

    /* ── Progress arc ── */
    .progress-wrap { display: flex; justify-content: center; }
    svg.arc { transform: rotate(-90deg); width: 72px; height: 72px; }
    .arc-bg  { fill: none; stroke: var(--border); stroke-width: 6; }
    .arc-fill {
      fill: none; stroke-width: 6; stroke-linecap: round;
      transition: stroke-dashoffset 0.15s, stroke 0.25s;
    }

    /* ── Tier indicator ── */
    .tier-indicator {
      width: 100%; max-width: 560px;
      border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      transition: background 0.25s, border-color 0.25s;
      border: 1.5px solid transparent;
    }
    .tier-indicator.tier-red   { background: rgba(239,68,68,.12);  border-color: rgba(239,68,68,.35); }
    .tier-indicator.tier-amber { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.35); }
    .tier-indicator.tier-green { background: rgba(34,197,94,.12);  border-color: rgba(34,197,94,.35); }
    .tier-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; transition: background 0.25s; }
    .tier-indicator.tier-red   .tier-dot { background: var(--red); }
    .tier-indicator.tier-amber .tier-dot { background: var(--amber); }
    .tier-indicator.tier-green .tier-dot { background: var(--green); }
    .tier-text strong { display: block; font-size: 0.9375rem; font-weight: 700; transition: color 0.25s; }
    .tier-indicator.tier-red   .tier-text strong { color: var(--red); }
    .tier-indicator.tier-amber .tier-text strong { color: var(--amber); }
    .tier-indicator.tier-green .tier-text strong { color: var(--green); }
    .tier-text span { font-size: 0.8125rem; color: var(--muted); }

    /* ── Char tier legend ── */
    .legend {
      width: 100%; max-width: 560px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .legend-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; text-align: center;
    }
    .legend-item .dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 6px; }
    .legend-item .range  { font-size: 0.6875rem; font-weight: 700; color: var(--muted); letter-spacing: 0.03em; }
    .legend-item .action { font-size: 0.75rem; font-weight: 600; margin-top: 2px; }
    .legend-item:nth-child(1) .dot    { background: var(--red); }
    .legend-item:nth-child(1) .action { color: var(--red); }
    .legend-item:nth-child(2) .dot    { background: var(--amber); }
    .legend-item:nth-child(2) .action { color: var(--amber); }
    .legend-item:nth-child(3) .dot    { background: var(--green); }
    .legend-item:nth-child(3) .action { color: var(--green); }

    /* ══════════════════════════════════════════
       REPLY QUALITY CHECKER — local rule engine
    ══════════════════════════════════════════ */

    .check-btn {
      width: 100%; max-width: 560px;
      padding: 14px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 12px;
      font-size: 0.9375rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-btn:active  { transform: scale(0.98); }
    .check-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Result panel ── */
    .quality-panel {
      width: 100%; max-width: 560px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px; padding: 20px;
      display: none; flex-direction: column; gap: 18px;
    }
    .quality-panel.visible { display: flex; }
    .quality-panel.v-strong { border-color: rgba(34,197,94,.45); }
    .quality-panel.v-average { border-color: rgba(245,158,11,.45); }
    .quality-panel.v-weak   { border-color: rgba(239,68,68,.45); }

    /* Verdict row */
    .verdict-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .verdict-badge {
      font-size: 2rem; font-weight: 900;
      letter-spacing: -0.02em; line-height: 1;
    }
    .verdict-badge.v-strong  { color: var(--green); }
    .verdict-badge.v-average { color: var(--amber); }
    .verdict-badge.v-weak    { color: var(--red); }
    .verdict-right { text-align: right; }
    .verdict-action {
      font-size: 0.875rem; font-weight: 700; margin-bottom: 2px;
    }
    .verdict-action.v-strong  { color: var(--green); }
    .verdict-action.v-average { color: var(--amber); }
    .verdict-action.v-weak    { color: var(--red); }
    .verdict-score {
      font-size: 0.75rem; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Score bar */
    .score-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
    .score-bar-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }
    .score-bar-header span:last-child { font-weight: 700; color: var(--text); }
    .bar-track { width: 100%; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 99px; width: 0%;
      transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.25s;
    }
    .bar-fill.v-strong  { background: var(--green); }
    .bar-fill.v-average { background: var(--amber); }
    .bar-fill.v-weak    { background: var(--red); }

    /* Score breakdown */
    .breakdown {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .breakdown-title {
      font-size: 0.6875rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8125rem; }
    .breakdown-row .bk-label { color: var(--muted); }
    .breakdown-row .bk-val { font-weight: 700; font-variant-numeric: tabular-nums; }
    .bk-val.pos { color: var(--green); }
    .bk-val.neg { color: var(--red); }
    .bk-val.neu { color: var(--muted); }
    .breakdown-divider { height: 1px; background: var(--border); margin: 2px 0; }
    .bk-val.total { color: var(--text); font-size: 0.9375rem; }

    /* Signal chips */
    .signals-wrap { display: flex; flex-direction: column; gap: 10px; }
    .signals-title {
      font-size: 0.6875rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .chips-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 99px;
      font-size: 0.75rem; font-weight: 600; border: 1px solid;
      white-space: nowrap;
    }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .chip.strong-sig {
      background: rgba(168,85,247,.15); color: var(--purple);
      border-color: rgba(168,85,247,.35);
    }
    .chip.strong-sig .chip-dot { background: var(--purple); }
    .chip.persp {
      background: rgba(34,197,94,.12); color: var(--green);
      border-color: rgba(34,197,94,.3);
    }
    .chip.persp .chip-dot { background: var(--green); }
    .chip.weak-sig {
      background: rgba(239,68,68,.12); color: var(--red);
      border-color: rgba(239,68,68,.3);
    }
    .chip.weak-sig .chip-dot { background: var(--red); }
    .chip.bonus {
      background: rgba(59,130,246,.12); color: var(--blue);
      border-color: rgba(59,130,246,.3);
    }
    .chip.bonus .chip-dot { background: var(--blue); }
    .no-signals { font-size: 0.8125rem; color: var(--muted); font-style: italic; }

    /* Suggestion / rewrite box */
    .suggestion-box {
      border-radius: 10px; padding: 12px 14px;
      font-size: 0.875rem; line-height: 1.55;
    }
    .suggestion-box.avg {
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.3);
    }
    .suggestion-box.wk {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.3);
    }
    .suggestion-box strong {
      display: block; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .suggestion-box.avg strong { color: var(--amber); }
    .suggestion-box.wk  strong { color: var(--red); }
    .suggestion-box p { color: var(--text); }
  </style>
</head>
<body>

  <header>
    <h1>X Reply Tools</h1>
    <p>Character counter · Reply quality checker</p>
  </header>

  <!-- ── CHARACTER COUNTER ── -->
  <div class="section-label">Character Counter</div>

  <div class="card" id="card">
    <textarea
      id="tweetInput"
      placeholder="Type your reply here…"
      maxlength="560"
      autocorrect="on"
      autocapitalize="sentences"
      spellcheck="true"
    ></textarea>

    <div class="counter-row">
      <div class="progress-wrap">
        <svg class="arc" viewBox="0 0 72 72" aria-hidden="true">
          <circle class="arc-bg"  cx="36" cy="36" r="30" />
          <circle class="arc-fill" id="arcFill" cx="36" cy="36" r="30"
            stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke="#22c55e" />
        </svg>
      </div>
      <div style="text-align:right">
        <div class="count-badge tier-green" id="countBadge">0</div>
        <div class="count-label" id="countLabel">chars typed</div>
      </div>
    </div>
  </div>

  <div class="tier-indicator tier-green" id="tierIndicator">
    <div class="tier-dot"></div>
    <div class="tier-text">
      <strong id="tierTitle">Substantial — post it</strong>
      <span id="tierSub">120–280 chars · strong signal, worth reading</span>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="dot"></div>
      <div class="range">0–59</div>
      <div class="action">Rewrite</div>
    </div>
    <div class="legend-item">
      <div class="dot"></div>
      <div class="range">60–119</div>
      <div class="action">Acceptable</div>
    </div>
    <div class="legend-item">
      <div class="dot"></div>
      <div class="range">120–280</div>
      <div class="action">Post it</div>
    </div>
  </div>

  <!-- ── REPLY QUALITY CHECKER ── -->
  <div class="section-label" style="margin-top:8px">Reply Quality</div>

  <button class="check-btn" id="checkBtn" disabled>
    Type a reply to check its quality
  </button>

  <div class="quality-panel" id="qualityPanel"></div>

  <script>
    /* ═══════════════════════════════════════
       CHARACTER COUNTER (unchanged)
    ═══════════════════════════════════════ */
    const MAX          = 280;
    const CIRCUMFERENCE = 2 * Math.PI * 30;

    const input     = document.getElementById('tweetInput');
    const card      = document.getElementById('card');
    const badge     = document.getElementById('countBadge');
    const label     = document.getElementById('countLabel');
    const arcFill   = document.getElementById('arcFill');
    const tierEl    = document.getElementById('tierIndicator');
    const tierTitle = document.getElementById('tierTitle');
    const tierSub   = document.getElementById('tierSub');
    const checkBtn  = document.getElementById('checkBtn');
    const panel     = document.getElementById('qualityPanel');

    const CHAR_TIERS = [
      { min: 0,   max: 59,  cls: 'tier-red',   color: '#ef4444', title: 'Throwaway — rewrite',   sub: '0–59 chars · too brief, add context or substance' },
      { min: 60,  max: 119, cls: 'tier-amber',  color: '#f59e0b', title: 'Medium — acceptable',   sub: '60–119 chars · decent but could be stronger' },
      { min: 120, max: 280, cls: 'tier-green',  color: '#22c55e', title: 'Substantial — post it', sub: '120–280 chars · strong signal, worth reading' },
    ];

    function getCharTier(len) {
      return CHAR_TIERS.find(t => len >= t.min && len <= t.max) || CHAR_TIERS[2];
    }

    function updateCounter() {
      const len  = input.value.length;
      const over = len > MAX;

      badge.textContent = len;
      label.textContent = over ? 'over limit' : 'chars typed';

      arcFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - Math.min(len / MAX, 1));

      const tier = getCharTier(Math.min(len, MAX));
      ['tier-red','tier-amber','tier-green'].forEach(c => {
        card.classList.remove(c);
        badge.classList.remove(c);
        tierEl.classList.remove(c);
      });
      card.classList.remove('over-limit');
      badge.classList.remove('over-limit');

      if (over) {
        card.classList.add('over-limit');
        badge.classList.add('over-limit');
        arcFill.style.stroke  = '#ef4444';
        tierTitle.textContent = 'Over limit — trim it';
        tierSub.textContent   = `${len - MAX} char${len - MAX !== 1 ? 's' : ''} over — X will cut you off`;
        tierEl.className      = 'tier-indicator tier-red';
      } else if (len === 0) {
        badge.classList.add('tier-green');
        arcFill.style.stroke  = '#22c55e';
        tierTitle.textContent = 'Substantial — post it';
        tierSub.textContent   = '120–280 chars · strong signal, worth reading';
        tierEl.className      = 'tier-indicator tier-green';
      } else {
        card.classList.add(tier.cls);
        badge.classList.add(tier.cls);
        arcFill.style.stroke  = tier.color;
        tierTitle.textContent = tier.title;
        tierSub.textContent   = tier.sub;
        tierEl.className      = `tier-indicator ${tier.cls}`;
      }

      const trimmed = input.value.trim();
      if (trimmed.length < 5) {
        checkBtn.disabled = true;
        checkBtn.textContent = 'Type a reply to check its quality';
      } else {
        checkBtn.disabled = false;
        checkBtn.textContent = 'Check Reply Quality';
      }
    }

    input.addEventListener('input', updateCounter);
    updateCounter();

    /* ═══════════════════════════════════════
       REPLY QUALITY ENGINE — local rule-based
    ═══════════════════════════════════════ */

    // Multi-word phrases listed before single words so longer matches run first.
    // Sorted by length descending inside each array.
    const WEAK_WORDS = [
      "we are on the same page", "keep up the good work",
      "thinking the same", "as it should be", "lets connect",
      "i follow back", "will be okay", "you got this",
      "growing pls", "same same", "fair point",
      "well done", "thank you", "agreed", "exactly",
      "facts", "true", "nice", "wow", "amen", "perfect",
      "nooo", "yess", "lol", "great", "awesome", "hopium",
      "contentment", "music", "thisss", "same",
      "congratulations",
    ].sort((a, b) => b.length - a.length);

    const PERSPECTIVE_WORDS = [
      "i don't see why", "i don't think", "make it make sense",
      "it's so fascinating", "i keep wondering",
      "this is actually", "really using", "they must",
      "i love that", "make sense", "i'm for", "i love",
      "i hope", "i don't", "why is", "how would", "what was",
      "i think", "because", "however", "actually", "imagine",
      "people", "better", "worse", "should", "would", "could",
      "isn't", "doesn't", "won't", "can't", "even",
      "but", "nah",
    ].sort((a, b) => b.length - a.length);

    const STRONG_SIGNAL_WORDS = [
      "irredeemably", "accountability", "fundamentally",
      "specifically", "essentially", "ultimately",
      "responsible", "fascinating", "intentional",
      "functional", "engagement", "perspective",
      "government", "disgusting", "ridiculous",
      "trivialize", "brilliant", "beautiful",
      "precisely", "obviously", "terrible",
      "actually", "poverty", "clearly", "poised",
      "stupid", "idiots", "clown", "evil",
      "sad",
    ].sort((a, b) => b.length - a.length);

    // Deduped list for display: if a phrase is in strong, don't show it again as perspective.
    const STRONG_SET = new Set(STRONG_SIGNAL_WORDS);

    function scan(text, phrases) {
      const lower = text.toLowerCase();
      const found = [];
      const usedRanges = [];

      for (const phrase of phrases) {
        let idx = lower.indexOf(phrase);
        while (idx !== -1) {
          // Check it's not already covered by a longer match
          const end = idx + phrase.length;
          const overlaps = usedRanges.some(([s, e]) => idx < e && end > s);
          if (!overlaps) {
            found.push(phrase);
            usedRanges.push([idx, end]);
            break; // count each phrase once per analysis
          }
          idx = lower.indexOf(phrase, idx + 1);
        }
      }
      return [...new Set(found)]; // dedupe
    }

    function analyse(text) {
      const weakFound   = scan(text, WEAK_WORDS);
      const strongFound = scan(text, STRONG_SIGNAL_WORDS);
      // Exclude perspective words that are already captured as strong signals
      const perspFound  = scan(text, PERSPECTIVE_WORDS).filter(p => !STRONG_SET.has(p));

      const hasQuestion    = text.includes('?');
      const hasNumber      = /\d+/.test(text);
      const hasCurrency    = /[$£€¥₦]/.test(text);
      const hasPercent     = /%/.test(text);
      // Rough proper-noun heuristic: capitalised word mid-text that isn't "I"
      const hasProperNoun  = /(?:\s)([A-Z][a-z]{1,})/.test(text);
      const hasSpecificity = hasNumber || hasCurrency || hasPercent || hasProperNoun;

      let score = 0;
      score -= weakFound.length;
      score += perspFound.length;
      score += strongFound.length * 2;
      if (hasQuestion)    score += 2;
      if (hasSpecificity) score += 1;

      // Clamp bar percentage 0–100 mapped from score range -5 to +10
      const barPct = Math.round(Math.max(0, Math.min(100, ((score + 5) / 15) * 100)));

      let verdict, vClass, action;
      if (score >= 3) {
        verdict = 'STRONG';  vClass = 'v-strong';  action = 'Adds perspective — post it';
      } else if (score >= 0) {
        verdict = 'AVERAGE'; vClass = 'v-average'; action = 'Could hit harder — see suggestion';
      } else {
        verdict = 'WEAK';    vClass = 'v-weak';    action = 'Just agreeing — rewrite it';
      }

      return {
        score, barPct, verdict, vClass, action,
        weakFound, perspFound, strongFound,
        hasQuestion, hasSpecificity,
        hasNumber, hasCurrency, hasPercent, hasProperNoun,
      };
    }

    function bonusDescription(r) {
      const parts = [];
      if (r.hasQuestion)    parts.push('question');
      if (r.hasNumber)      parts.push('number');
      if (r.hasCurrency)    parts.push('currency');
      if (r.hasPercent)     parts.push('percentage');
      if (r.hasProperNoun)  parts.push('proper noun');
      return parts.join(', ');
    }

    function buildSuggestion(r) {
      if (r.vClass === 'v-strong') return null;

      if (r.vClass === 'v-weak') {
        const examples = r.weakFound.length
          ? `Drop words like "${r.weakFound[0]}" and replace with your actual take.`
          : 'No perspective signals detected at all.';
        return {
          cls: 'wk',
          heading: 'Rewrite prompt',
          body: `${examples} Try starting with: "I think…", "But…", or "What this actually means is…"`,
        };
      }

      // AVERAGE
      if (r.weakFound.length && r.perspFound.length === 0 && r.strongFound.length === 0) {
        return {
          cls: 'avg',
          heading: 'Suggestion',
          body: `You have filler words pulling the score down ("${r.weakFound[0]}"). Add a clear opinion or a "?" to flip this to STRONG.`,
        };
      }
      if (r.weakFound.length > 0) {
        return {
          cls: 'avg',
          heading: 'Suggestion',
          body: `Close — remove "${r.weakFound[0]}" and your score jumps. Or add a question to push past the threshold.`,
        };
      }
      if (!r.hasQuestion) {
        return {
          cls: 'avg',
          heading: 'Suggestion',
          body: `You have perspective signals. Add a "?" or a strong opinion word (e.g. "brilliant", "terrible", "fundamentally") to reach STRONG.`,
        };
      }
      return {
        cls: 'avg',
        heading: 'Suggestion',
        body: `Almost there. Layer in a specific number, claim, or a STRONG_SIGNAL word to cross into STRONG territory.`,
      };
    }

    function chip(text, cls) {
      return `<span class="chip ${cls}"><span class="chip-dot"></span>${text}</span>`;
    }

    function renderResult(r) {
      const scoreSign   = r.score > 0 ? '+' : '';
      const perspPoints = r.perspFound.length;
      const strongPoints = r.strongFound.length * 2;
      const weakPoints  = -r.weakFound.length;
      const bonusPoints = (r.hasQuestion ? 2 : 0) + (r.hasSpecificity ? 1 : 0);

      // Breakdown rows
      const bkRows = [
        { label: 'Perspective words', val: perspPoints, show: perspPoints !== 0 },
        { label: 'Strong signal words (×2)', val: strongPoints, show: strongPoints !== 0 },
        { label: 'Weak / filler words', val: weakPoints, show: weakPoints !== 0 },
        { label: 'Bonuses (? / specificity)', val: bonusPoints, show: bonusPoints !== 0 },
      ].filter(row => row.show);

      const bkRowsHTML = bkRows.map(row => {
        const cls = row.val > 0 ? 'pos' : row.val < 0 ? 'neg' : 'neu';
        const sign = row.val > 0 ? '+' : '';
        return `<div class="breakdown-row">
          <span class="bk-label">${row.label}</span>
          <span class="bk-val ${cls}">${sign}${row.val}</span>
        </div>`;
      }).join('');

      // Signal chips
      const strongChips = r.strongFound.map(w => chip(w, 'strong-sig')).join('');
      const perspChips  = r.perspFound.map(w => chip(w, 'persp')).join('');
      const weakChips   = r.weakFound.map(w => chip(w, 'weak-sig')).join('');
      const bonusDesc   = bonusDescription(r);
      const bonusChips  = bonusDesc ? chip(bonusDesc, 'bonus') : '';

      const allChips = strongChips + perspChips + weakChips + bonusChips;
      const chipsHTML = allChips
        ? `<div class="chips-row">${allChips}</div>`
        : `<p class="no-signals">No keyword signals detected — reply is neutral.</p>`;

      // Suggestion
      const sug = buildSuggestion(r);
      const sugHTML = sug
        ? `<div class="suggestion-box ${sug.cls}">
             <strong>${sug.heading}</strong>
             <p>${sug.body}</p>
           </div>`
        : '';

      panel.className = `quality-panel visible ${r.vClass}`;
      panel.innerHTML = `
        <div class="verdict-row">
          <div class="verdict-badge ${r.vClass}">${r.verdict}</div>
          <div class="verdict-right">
            <div class="verdict-action ${r.vClass}">${r.action}</div>
            <div class="verdict-score">score: ${scoreSign}${r.score}</div>
          </div>
        </div>

        <div class="score-bar-wrap">
          <div class="score-bar-header">
            <span>Signal strength</span>
            <span>${r.verdict}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${r.vClass}" id="barFill" style="width:0%"></div>
          </div>
        </div>

        <div class="breakdown">
          <div class="breakdown-title">Score breakdown</div>
          ${bkRowsHTML}
          ${bkRows.length ? '<div class="breakdown-divider"></div>' : ''}
          <div class="breakdown-row">
            <span class="bk-label">Total</span>
            <span class="bk-val total">${scoreSign}${r.score}</span>
          </div>
        </div>

        <div class="signals-wrap">
          <div class="signals-title">Detected signals</div>
          ${chipsHTML}
        </div>

        ${sugHTML}`;

      // Animate bar
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const bar = document.getElementById('barFill');
        if (bar) bar.style.width = r.barPct + '%';
      }));
    }

    checkBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text || text.length < 5) return;
      const result = analyse(text);
      renderResult(result);
      checkBtn.textContent = 'Check Again';
    });
  </script>
</body>
</html>
