<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      gap: 32px;
    }
    h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; }
    p  { color: #94a3b8; font-size: 0.9375rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 800px;
    }
    a.card {
      background: #1e293b;
      border: 1.5px solid #334155;
      border-radius: 14px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
    }
    a.card:hover { border-color: #64748b; transform: translateY(-2px); }
    a.card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    a.card p  { font-size: 0.8125rem; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <h1>Claude Code Playground</h1>
    <p>Projects built with Claude Code</p>
  </div>
  <div class="grid">
    <a class="card" href="x-growth-tools/">
      <h2>X Growth Tools</h2>
      <p>Tweet Character Counter and more tools for growing on X.</p>
    </a>
    <a class="card" href="neurons-not-included/">
      <h2>Neurons Not Included</h2>
      <p>Pixel brain training game.</p>
    </a>
  </div>
</body>
</html>
